<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      background: transparent;
      color: #00ffcc;
      font-family: monospace;
      font-size: 48px;
    }
  </style>
</head>
<body>
  <div id="q">QUEUE: 0</div>

  <script>
    async function update() {
      try {
        const res = await fetch("https://wonq.tv/visuals/api/status");
        const data = await res.json();
        document.getElementById("q").innerText =
          "QUEUE: " + data.queue_length;
      } catch (e) {}
    }

    setInterval(update, 2000);
    update();
  </script>
</body>
</html>
