# ═══════════════════════════════════════════════════════════════════════════════
# Visual FaQtory v0.9.0-beta — config.yaml
# ═══════════════════════════════════════════════════════════════════════════════
#
# Active config preserves every previously-set value exactly. Only changes vs
# previous version: the dead `width / height / aspect_ratio / resolution` keys
# under `backend / image_backend / video_backend / morph_backend` were removed
# because they are NOT consumed when `type: venice` — Venice reads dimensions
# only from `venice.image.*` and `venice.video.*`. All Venice-relevant size
# settings live in those sub-blocks below.
#
# Every available config parameter is documented inline as a commented-out
# reference. Nothing commented changes runtime behaviour — uncomment to use.
# A fully-filled reference lives in `config.example.yaml`.
# ═══════════════════════════════════════════════════════════════════════════════

paths:
  output_dir: ./run
  briqs_dir: ./run/briqs

# ─────────────────────────────────────────────────────────────────────────────
# backend.type chooses the default backend for all capabilities. The split
# blocks below (image_backend / video_backend / morph_backend) override per
# capability when present. For Venice setups all three normally point at
# `venice` and the actual settings live under the top-level `venice:` block.
# ─────────────────────────────────────────────────────────────────────────────
backend:
  type: venice
  timeout: 600

image_backend:
  type: venice

video_backend:
  type: venice

morph_backend:
  type: venice

input:
  mode: image                     # text | image | video

venice:
  api_key: ${VENICE_API_KEY}
  base_url: https://api.venice.ai/api/v1
  api_key_env: VENICE_API_KEY

  timeout: 600
  poll_interval: 2
  poll_timeout: 600
  max_retries: 2
  retry_backoff_base: 2
  retry_backoff_max: 22
  cleanup_after_download: true
  validate_models: false
  strict_model_validation: false

  models:
    text2img: seedream-v4
    img2img: seedream-v4-edit
    text2vid: kling-2.5-turbo-pro-text-to-video
    img2vid: kling-2.5-turbo-pro-image-to-video

  image:
    width: 1280
    height: 720
    aspect_ratio: "16:9"         # Venice valid: 1:1 | 3:2 | 16:9 | 21:9 | 9:16 | 2:3 | 3:4 | 4:5 | auto
    resolution: 720p
    cfg_scale: 8
    steps: 8
    negative_prompt: ""
    hide_watermark: true
    safe_mode: false
    # ── Optional image params (commented = inherit defaults) ────────────────
    # variants: 1                # Number of images per request
    # seed: 0                    # Per-image seed (0 = use story seed)
    # style_preset: null         # Venice style preset id
    # lora_strength: null        # 0–100 LoRA blend strength

  video:
    width: 1280
    height: 720
    aspect_ratio: "16:9"         # Venice valid: 1:1 | 3:2 | 16:9 | 21:9 | 9:16 | 2:3 | 3:4 | 4:5 | auto
    resolution: 720p
    negative_prompt: ""
    audio: false
    # ── Optional video params (commented = inherit defaults) ────────────────
    # duration: "5s"             # Default if no per-op duration set; or:
    # duration_seconds: 5        # numeric variant (becomes "5s" internally)
    # seed: null                 # Video seed (null = backend default)
    # reference_image_urls: []   # Optional reference image URLs (model-dependent)
    # poll_interval: 2           # Override venice.poll_interval just for video
    # poll_timeout: 600          # Override venice.poll_timeout just for video

    text2vid:
      duration_seconds: 4
      width: 1280
      height: 720
      aspect_ratio: "16:9"
      resolution: 720p

    img2vid:
      duration_seconds: 4
      width: 1280
      height: 720
      aspect_ratio: "16:9"
      resolution: 720p
#      width: 856 aspect???
#      heidht: 480

  text_to_video_first_cycle: true
  enable_end_frame_morph: true
  enable_loop_closure: true

  # ── Other Venice top-level options (commented = use defaults) ─────────────
  # image_model: seedream-v4               # alias of models.text2img
  # image_edit_model: seedream-v4          # alias of models.img2img
  # video_model_text_to_video: seedance-1-5-pro-text-to-video   # alias of models.text2vid
  # video_model_image_to_video: seedance-1-5-pro-image-to-video # alias of models.img2vid

paragraph_story:
  max_paragraphs: 2
  img2vid_duration_sec: 4
  video_fps: 30
#  seed_base: 1221
  rolling_window: true
  require_morph: true
  enable_loop_closure: true
  img2img_denoise_min: 0.44
  img2img_denoise_max: 0.88
  # ── Other paragraph_story options (commented = use defaults) ──────────────
  # video_frames: null                          # Override frame count (else derived)
  # timing_authority: null                      # frames | duration | fps
  # reinject: true                              # img2img keyframe every cycle
  # continuity_guard_enabled: true              # Retry overly-drifted videos
  # continuity_similarity_threshold: 0.42       # 0..1 stricter for conditioned video
  # continuity_morph_similarity_threshold: 0.86 # Morph endpoints must land closer
  # continuity_retry_attempts: 2                # Extra retries after first render
  # continuity_ffmpeg_fallback_enabled: true    # ffmpeg fallback for unrecoverable cases
  # continuity_ffmpeg_fallback_min_similarity: 0.32
  # continuity_force_fallback_for_morph: true   # Never propagate weak morph endpoints

finalizer:
  enabled: true
  per_cycle_pingpong: false
  per_cycle_interpolation: false
  upscale_resolution: 1920x1080
  interpolate_fps: 60
  scale_algo: bicubic
  post_run_interpolation: true    # minterpolate + upscale (defaults to `enabled`)
  # per_cycle_interpolate_fps: 30   # Per-cycle FPS (else uses interpolate_fps)
  post_interpolate_fps: 60        # Post-stitch FPS (independent of per-cycle)
  encoder_preference: ["h264_nvenc", "libx264"]   # List form picks first available
  quality: 11
  # quality:                        # Or split into two:
  #  crf: 11                       #   per-cycle/post-stitch CRF if dict-form
  #  encoder_preference: auto
  # ── Post-run stages (v0.9.1+) — independent of per-cycle ─────────────────
  # When `enabled: true`:
  #   • `post_run_interpolation` defaults to true (legacy behaviour). When
  #     true, runs minterpolate → upscale on the stitched master to produce
  #     final_60fps_1080p.mp4.
  #   • `post_run_pingpong` defaults to false. When true, mirrors the entire
  #     stitched master (forward + reverse-without-seam-frame) into a perfect
  #     loop. If only pingpong is on, the deliverable is final_pingpong.mp4.
  #     If both are on, pingpong feeds into interpolation → upscale.
  # post_run_pingpong: false        # mirror final master into perfect loop
  # ── Other finalizer options (commented = use defaults) ────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# AUDIO (optional — only used when an audio file is present in worqspace)
# ─────────────────────────────────────────────────────────────────────────────
# audio:
#   enabled: true                # Mux audio into final deliverable
#   sync_video_audio: false      # Compute cycle count from audio duration
#   cycle_seconds: 4             # Seconds per cycle when sync_video_audio: true
#                                # (defaults to paragraph_story.img2vid_duration_sec)

# ═══════════════════════════════════════════════════════════════════════════════
# CROWD CONTROL (Live Audience Prompt Injection)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Enables live viewers to submit visual prompts via QR code during streams.
# The crowd-control FastAPI server runs on the visuals machine and serves:
#   - A web page where viewers type prompts
#   - A QR code image for OBS overlay
#   - A queue API consumed by the generator
#
# Disabled by default. Enable + set pop_token + run: python vfaq_cli.py crowd
#
# Later, WoNQ.TV infra will reverse proxy:
#   https://wonq.tv/visuals → http://<visuals-zt-ip>:8808/visuals
#
# ═══════════════════════════════════════════════════════════════════════════════
crowd_control:
  enabled: false                        # Set true to activate crowd prompt injection
  base_url: "http://10.20.30.22:8000/visuals"  # Where the generator reaches the server
  pop_token: "Setyup34Setyup34Setyup34Setyup34"    # Bearer token for /api/next endpoint
  timeout_seconds: 2.0                  # HTTP timeout for generator→server calls
  inject_label: "Audience mutation request"  # Label injected into the prompt
  inject_mode: "append"                 # append = add to story | replace = override story
  # inject_source_mode (v0.9.1+) — controls HOW the audience prompt drives
  # the next cycle (only relevant when crowd_control.enabled: true):
  #
  #   "as_image_source"  (default) → IMG2VID with previous lastframe as the
  #     SOURCE image. Audience prompt drives motion/content; lastframe gives
  #     hard visual continuity from previous cycle.
  #
  #   "as_reference"               → TEXT2VID with previous lastframe as a
  #     REFERENCE image (when the model supports it; else dropped). Audience
  #     prompt is the primary visual driver; lastframe acts as soft style /
  #     identity tether rather than hard frame continuity.
  #
  # `inject_mode` is orthogonal: append = paragraph + audience text, replace
  # = audience text only. Source mode is independent of that.
  inject_source_mode: "as_image_source"
  carryover_cycles: 0                  # 0 = current only, 1 = +next cycle, 2 = +next two cycles
  max_chars: 300                        # Max prompt length from viewers
  rate_limit_seconds: 180               # 1 submission per IP per this many seconds
  max_queue: 100                        # Max pending prompts in queue
  badwords_path: "worqspace/badwords.txt"  # Bad word filter file
  public_url: "https://wonq.tv/visuals" # URL the QR code points to (override for local dev)
  prefix: "/visuals"                    # URL prefix (must match reverse proxy path)
  db_path: "worqspace/crowdcontrol.sqlite3"  # SQLite database path
