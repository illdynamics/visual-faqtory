# ═══════════════════════════════════════════════════════════════════════════════
# Visual FaQtory v0.9.0-beta — config.example.yaml
# ═══════════════════════════════════════════════════════════════════════════════
#
# FULLY-FILLED reference config. Every available parameter the engine reads is
# present here with a documented value. Use as a copy-paste catalogue when
# tuning your real config.yaml — most fields are optional and have sensible
# defaults if omitted.
#
# Venice-valid aspect_ratio enum (used by /image/edit and /video/queue):
#   1:1 | 3:2 | 16:9 | 21:9 | 9:16 | 2:3 | 3:4 | 4:5 | auto
#
# Resolution + aspect_ratio determine output pixel dimensions for video:
#   480p + 16:9 → 856×480
#   720p + 16:9 → 1280×720
#   480p + 9:16 → 480×856
#
# As of v0.9.0-beta, any aspect_ratio value (computed or set) is auto-snapped
# to the nearest valid Venice enum value via log-distance — so 856×480 maps to
# 16:9, never to the broken-but-mathematically-correct 107:60.
# ═══════════════════════════════════════════════════════════════════════════════

paths:
  output_dir: ./run
  briqs_dir: ./run/briqs

# ─────────────────────────────────────────────────────────────────────────────
# Backend selection. For Venice setups all three capabilities point at venice
# and the actual size / model settings live under the `venice:` block below.
# These top-level blocks only carry `type` (and optionally `timeout`).
# ─────────────────────────────────────────────────────────────────────────────
backend:
  type: venice          # venice | comfyui | veo | mock
  timeout: 600          # Global HTTP timeout fallback (Venice uses venice.timeout)

image_backend:
  type: venice

video_backend:
  type: venice

morph_backend:
  type: venice

input:
  mode: text            # text | image | video — initial story input mode

# ═══════════════════════════════════════════════════════════════════════════════
# VENICE — native Venice.ai backend (image + video)
# ═══════════════════════════════════════════════════════════════════════════════
venice:
  # ── Auth / endpoint ───────────────────────────────────────────────────────
  api_key: ${VENICE_API_KEY}
  api_key_env: VENICE_API_KEY
  base_url: https://api.venice.ai/api/v1

  # ── HTTP / retry behaviour ────────────────────────────────────────────────
  timeout: 600                    # Per-request HTTP timeout (seconds)
  poll_interval: 2                # Seconds between video-job status polls
  poll_timeout: 600               # Hard ceiling for a single video job
  max_retries: 2                  # Retries on 429/500/503
  retry_backoff_base: 2           # Exponential base: delay = base * 2^(attempt-1)
  retry_backoff_max: 22           # Max single retry delay (seconds)
  cleanup_after_download: true    # Delete server-side video after fetch
  validate_models: false          # Probe /models on startup (slows boot when true)
  strict_model_validation: false  # Hard-fail vs warn on missing models

  # ── Model selection ───────────────────────────────────────────────────────
  models:
    text2img: seedream-v4
    img2img: seedream-v4
    text2vid: seedance-1-5-pro-text-to-video
    img2vid: seedance-1-5-pro-image-to-video

  # Flat-alias overrides (rarely needed — `models:` above is the canonical form):
  # image_model: seedream-v4
  # image_edit_model: seedream-v4
  # video_model_text_to_video: seedance-1-5-pro-text-to-video
  # video_model_image_to_video: seedance-1-5-pro-image-to-video

  # ── Image endpoint settings (text2img + img2img) ──────────────────────────
  image:
    width: 856
    height: 480
    aspect_ratio: "16:9"          # Used by /image/edit; snapped to Venice enum
    resolution: 720p              # Reserved for future use; harmless if model ignores
    cfg_scale: 8
    steps: 8
    negative_prompt: ""
    hide_watermark: true
    safe_mode: false
    variants: 1                   # Number of images per request
    seed: 0                       # Per-image seed (0 = use story seed)
    style_preset: null            # Venice style preset id, or null
    lora_strength: null           # 0–100, or null

  # ── Video endpoint settings (text2vid + img2vid) ──────────────────────────
  video:
    aspect_ratio: "16:9"          # Snapped to nearest Venice enum value
    resolution: 480p              # 360p | 480p | 576p | 720p | 1080p | 1440p
    duration: "5s"                # Default duration for both ops; or duration_seconds: 5
    negative_prompt: "low resolution, error, worst quality, low quality, defects"
    audio: false                  # Generate native audio track when supported
    seed: null                    # Video seed (null = backend default)
    reference_image_urls: []      # Optional reference URLs (model-dependent)
    poll_interval: 2              # Override venice.poll_interval just for video
    poll_timeout: 900             # Override venice.poll_timeout just for video

    # Per-operation overrides — omit any field to inherit the global above.
    text2vid:
      duration_seconds: 5
      aspect_ratio: "16:9"
      resolution: 720p

    img2vid:
      duration_seconds: 6
      aspect_ratio: "16:9"
      resolution: 720p

  # ── Cycle-flow flags ──────────────────────────────────────────────────────
  text_to_video_first_cycle: false   # false → cycle 1 does text2img → img2vid
                                     # true  → cycle 1 does text2vid directly
  enable_end_frame_morph: true       # Use end_image_url for first/last-frame morphs
  enable_loop_closure: true          # Generate final loop clip back to anchor

# ═══════════════════════════════════════════════════════════════════════════════
# PARAGRAPH STORY — sliding-window cycle engine
# ═══════════════════════════════════════════════════════════════════════════════
paragraph_story:
  max_paragraphs: 2                       # Window size: paragraphs visible per cycle
  img2vid_duration_sec: 6                 # Seconds per video cycle
  video_fps: 24                           # FPS of generated cycle video
  video_frames: null                      # Override frame count (null = derived)
  timing_authority: duration              # frames | duration | fps
  seed_base: 9999                         # Base seed for deterministic story runs
  rolling_window: true                    # Slide one paragraph per cycle
  require_morph: true                     # Force first/last-frame morph each cycle
  enable_loop_closure: true               # Final clip transitions back to cycle 1 anchor
  reinject: true                          # img2img keyframe every cycle
  smart_reinject_enabled: false           # Async prefetch keyframe for next cycle
  smart_reinject_every_n_cycles: 1        # 1 = every eligible cycle
  smart_reinject_use_morph: true          # true = first/last morph, false = i2v from prefetched frame
  smart_reinject_similarity_guard_enabled: true
  smart_reinject_similarity_threshold: 0.42
  smart_reinject_wait_timeout_sec: 0      # 0 = never wait for late prefetch
  smart_reinject_sync_fallback: false     # true = fallback to old sync require_morph path
  smart_reinject_denoise_min: 0.25
  smart_reinject_denoise_max: 0.45
  smart_reinject_prompt_prefix: "Preserve the source image strongly. Make a subtle evolved keyframe for the next visual beat. Keep composition, identity, palette, lighting, and major shapes stable. Avoid large scene changes."
  # For smart async reinject, lower denoise is safer:
  # smart_reinject_denoise_min: 0.25
  # smart_reinject_denoise_max: 0.45
  img2img_denoise_min: 0.55               # Lower bound of per-cycle denoise jitter
  img2img_denoise_max: 0.88               # Upper bound of per-cycle denoise jitter
  continuity_guard_enabled: true          # Retry overly-drifted conditioned videos
  continuity_similarity_threshold: 0.42   # 0..1 — stricter for generic conditioned video
  continuity_morph_similarity_threshold: 0.86  # Morph endpoints must land much closer
  continuity_retry_attempts: 2            # Extra retries after the first render
  continuity_ffmpeg_fallback_enabled: true     # ffmpeg crossfade fallback for soup
  continuity_ffmpeg_fallback_min_similarity: 0.32
  continuity_force_fallback_for_morph: true    # Never propagate weak morph endpoints

# ═══════════════════════════════════════════════════════════════════════════════
# FINALIZER — stitch + interpolate + upscale + audio mux
# ═══════════════════════════════════════════════════════════════════════════════
finalizer:
  enabled: true
  per_cycle_pingpong: true                # Pingpong each cycle clip (independent of interpolation)
  per_cycle_interpolation: false          # Per-cycle minterpolate (slow)
  per_cycle_interpolate_fps: 30           # FPS for per-cycle interpolation
  # ── Post-run stages (v0.9.1+) — independent of per-cycle ─────────────
  post_run_pingpong: true                 # Mirror final master into a perfect loop
  post_run_interpolation: true            # Run minterpolate + upscale on final master
                                          #   (defaults to value of `enabled`)
  interpolate_fps: 30                     # Legacy alias — used as per-cycle FPS when set
  post_interpolate_fps: 60                # Post-stitch FPS (final deliverable)
  upscale_resolution: 1920x1080           # Final upscale resolution
  scale_algo: bicubic                     # bicubic | lanczos | bilinear
  encoder_preference: ["h264_nvenc", "libx264"]   # List → picks first available
  quality:                                # Or just `quality: 16` (int) for both
    crf: 16

# ═══════════════════════════════════════════════════════════════════════════════
# AUDIO (optional — only used when an audio file is present in worqspace)
# ═══════════════════════════════════════════════════════════════════════════════
audio:
  enabled: true                # Mux audio into final deliverable
  sync_video_audio: false      # Compute cycle count from audio duration
  cycle_seconds: 4             # Seconds per cycle when sync_video_audio: true

# ═══════════════════════════════════════════════════════════════════════════════
# CROWD CONTROL (Live Audience Prompt Injection)
# ═══════════════════════════════════════════════════════════════════════════════
crowd_control:
  enabled: false                          # true to activate live prompt injection
  base_url: "http://10.20.30.22:8000/visuals"  # Where the generator reaches the server
  pop_token: "CHANGE_ME_LONG_RANDOM"      # Bearer token for /api/next endpoint
  timeout_seconds: 2.0                    # HTTP timeout for generator→server calls
  inject_label: "Audience mutation request"   # Label injected into the prompt
  inject_mode: "append"                   # append | replace
  inject_source_mode: "as_image_source"   # as_image_source | as_reference
                                          #
                                          # as_image_source (default):
                                          #   IMG2VID with previous lastframe as
                                          #   SOURCE image. Audience prompt drives
                                          #   motion; lastframe = hard continuity.
                                          #
                                          # as_reference:
                                          #   TEXT2VID with previous lastframe as
                                          #   REFERENCE image (model permitting).
                                          #   Audience prompt drives visuals;
                                          #   lastframe = soft style/identity tether.
  max_chars: 300                          # Max prompt length from viewers
  rate_limit_seconds: 180                 # 1 submission per IP per this many seconds
  max_queue: 100                          # Max pending prompts in queue
  badwords_path: "worqspace/badwords.txt" # Bad word filter file
  public_url: "https://wonq.tv/visuals"   # URL the QR code points to
  prefix: "/visuals"                      # URL prefix (must match reverse proxy path)
  db_path: "worqspace/crowdcontrol.sqlite3"   # SQLite database path
