# Visual FaQtory Configuration v0.5.7-beta
# ═══════════════════════════════════════════════════════════════════════════════
#
# Clean base configuration — paragraph_story + ComfyUI + reinject default ON
#
# Pipeline: story.txt → sliding window → ComfyUI (txt2img/img2img/img2vid)
#           → finalizer (stitch → 60fps → 1080p → audio mux)
#           → save to worqspace/saved-runs/<project-name>
#
# ═══════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════════════════════════
paths:
  output_dir: ./run                 # Current run artifacts
  briqs_dir: ./run/briqs            # Per-cycle JSON state

# ═══════════════════════════════════════════════════════════════════════════════
# INPUT CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
#
# Input modes:
#   text  — Prompt only (txt2img → img2vid per cycle)
#   image — Base image from worqspace/base_images/ (img2img → img2vid)
#   video — Extract frame from worqspace/base_video/ → treat as image mode
#   auto  — Auto-detect: video > image > text
#
# After cycle 0, pipeline chains: last frame → reinject img2img → img2vid
# ═══════════════════════════════════════════════════════════════════════════════
input:
  mode: text                        # auto | text | image | video

# ═══════════════════════════════════════════════════════════════════════════════
# BACKEND CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
#
# ComfyUI is the only supported production backend.
# Mock backend available for testing (generates placeholder files).
# ═══════════════════════════════════════════════════════════════════════════════
backend:
  type: comfyui
  api_url: http://localhost:8188
  # workflow_image: null             # Uses default SDXL workflow
  # workflow_video: null             # Uses default SVD workflow
  # workflow_morph: null             # Must point to a REAL two-image morph workflow JSON
  timeout: 600
  width: 1024
  height: 576

comfyui:
  sdxl_ckpt: juggernautXL_ragnarokBy.safetensors
  svd_ckpt: svd_xt_1_1.safetensors

# ─── LoRA Configuration ──────────────────────────────────────────────────────
# LoRA injection for the ComfyUI backend. Enable and specify a .safetensors
# file to apply stylistic modifiers to the base model.
lora:
  enabled: false
  path: /x/ComfyUI/models/loras/pytorch_lora_weights.safetensors
  strength: 0.4
  backend: comfyui

# ═══════════════════════════════════════════════════════════════════════════════
# SLIDING WINDOW STORY ENGINE (paragraph_story)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Reads worqspace/story.txt, splits into paragraphs, uses a rolling window
# to generate progressive visual cycles. Each cycle:
#   1. Build prompt from paragraph window
#   2. img2img keyframe from last frame (reinject mode)
#   3. img2vid from keyframe
#   4. Extract last frame for next cycle
#
# ═══════════════════════════════════════════════════════════════════════════════
paragraph_story:
  max_paragraphs: 2                 # Maximum paragraphs per window
  img2vid_duration_sec: 2           # Duration of each transition video (sec)
  img2img_denoise_min: 0.22         # Minimum denoise for img2img evolution
  img2img_denoise_max: 0.33         # Maximum denoise for img2img evolution
  video_fps: 4                      # FPS for cycle videos
  seed_base: 2768                   # Base seed for deterministic runs
  rolling_window: true
  require_morph: false              # Set true to use morph workflow

# ═══════════════════════════════════════════════════════════════════════════════
# AUDIO CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
#
# Drop audio files into worqspace/base_audio/ — they will be auto-detected.
# Audio is muxed into the final video after all processing is complete.
#
# sync_video_audio: when true, the number of cycles is auto-computed from
# audio duration ÷ cycle_seconds (rounded up, max 2s overrun).
# ═══════════════════════════════════════════════════════════════════════════════
audio:
  enabled: false
  sync_video_audio: false           # Set true to auto-compute cycles from audio
  cycle_seconds: 2                  # Must match img2vid_duration_sec
  allow_ext:
    - wav
    - mp3
    - flac

# ═══════════════════════════════════════════════════════════════════════════════
# CROWD CONTROL (Live Audience Prompt Injection)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Enables live viewers to submit visual prompts via QR code during streams.
# The crowd-control FastAPI server runs on the visuals machine and serves:
#   - A web page where viewers type prompts
#   - A QR code image for OBS overlay
#   - A queue API consumed by the generator
#
# Disabled by default. Enable + set pop_token + run: python vfaq_cli.py crowd
#
# Later, WoNQ.TV infra will reverse proxy:
#   https://wonq.tv/visuals → http://<visuals-zt-ip>:8808/visuals
#
# ═══════════════════════════════════════════════════════════════════════════════
crowd_control:
  enabled: false                        # Set true to activate crowd prompt injection
  base_url: "http://10.20.30.22:8000/visuals"  # Where the generator reaches the server
  pop_token: "Setyup34Setyup34Setyup34Setyup34"    # Bearer token for /api/next endpoint
  timeout_seconds: 1.0                  # HTTP timeout for generator→server calls
  inject_label: "Audience mutation request"  # Label injected into the prompt
  inject_mode: "replace"                 # append = add to story | replace = override story
  max_chars: 300                        # Max prompt length from viewers
  rate_limit_seconds: 180               # 1 submission per IP per this many seconds
  max_queue: 100                        # Max pending prompts in queue
  badwords_path: "worqspace/badwords.txt"  # Bad word filter file
  public_url: "https://wonq.tv/visuals" # URL the QR code points to (override for local dev)
  prefix: "/visuals"                    # URL prefix (must match reverse proxy path)
  db_path: "worqspace/crowdcontrol.sqlite3"  # SQLite database path

# ═══════════════════════════════════════════════════════════════════════════════
# POST-STITCH FINALIZER (Interpolation + Upscale + Audio Mux)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Runs ONCE after all cycles are complete:
#   1. Stitch all cycle videos → final_video.mp4
#   2. Interpolate to 60fps → final_video_60fps.mp4
#   3. Upscale to 1080p → final_video_60fps_1080p.mp4
#   4. Audio mux (if audio present) → final_video_60fps_1080p_audio.mp4
#   5. Save deliverable as <project-name>.mp4 in saved-runs
#
# Per-cycle interpolation and pingpong occur before this stage.
# ═══════════════════════════════════════════════════════════════════════════════
finalizer:
  enabled: true
  per_cycle_interpolation: false
  per_cycle_pingpong: false
  interpolate_fps: 30 # For per-cycle interpolation/pingpong. Post-stitch defaults to 60.
  upscale_resolution: 1280x720
  scale_algo: bicubic
  encoder_preference: auto # auto | h264_nvenc | libx264
  quality: 16 # CRF value for per-cycle encoding (0-51, lower is higher quality)
